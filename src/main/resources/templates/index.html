<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Jagadeesh Company Employee Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
            font-family: "Segoe UI", sans-serif;
        }

        .navbar {
            background: linear-gradient(135deg, #1d2b64, #f8cdda);
        }

        .navbar-brand {
            font-weight: bold;
            color: white !important;
        }

        .stat-card {
            color: white;
            padding: 20px;
            border-radius: 15px;
        }

        .blue { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .green { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .orange { background: linear-gradient(135deg, #fa709a, #fee140); }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .table thead {
            background: #1d2b64;
            color: white;
        }

        .btn-action {
            border-radius: 8px;
            padding: 4px 10px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg px-3">
    <a class="navbar-brand" href="#">
        🏢 Jagadeesh Employee System
    </a>

    <div class="ms-auto">
        <a href="/add" class="btn btn-light btn-sm">+ Add Employee</a>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="mb-3">Employee Dashboard</h3>

    <!-- STATS -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="stat-card blue">
                <h5>Total Employees</h5>
                <h3 th:text="${list.size()}">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card green">
                <h5>System Status</h5>
                <h3>Active</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card orange">
                <h5>Departments</h5>
                <h3>IT / HR / Finance</h3>
            </div>
        </div>

    </div>

    <!-- TABLE -->
    <div class="table-container">

        <h5 class="mb-3">Employee Records</h5>

        <!-- SEARCH + FILTER -->
        <div class="search-box">

            <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search employee...">

            <select id="deptFilter" class="form-select">
                <option value="">All Departments</option>
                <option>IT</option>
                <option>Finance</option>
                <option>HR</option>
                <option>Marketing</option>
                <option>Sales</option>
                <option>DevOps</option>
            </select>

            <!-- NEW: Designation Filter -->
            <select id="desigFilter" class="form-select">
                <option value="">All Designations</option>
                <option>Associate Software Engineer</option>
                <option>Software Engineer</option>
                <option>Senior Software Engineer</option>
                <option>Tech Lead</option>
                <option>Team Lead</option>
                <option>Project Manager</option>
                <option>Engineering Manager</option>
                <option>Business Analyst</option>
                <option>DevOps Engineer</option>
                <option>QA Engineer</option>
            </select>

        </div>

        <table class="table table-hover align-middle" id="empTable">

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Skills</th>
                    <th>Experience</th>
                    <th>Department</th>
                    <th>Designation</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="emp : ${list}">

                    <td th:text="${emp.name}"></td>
                    <td th:text="${emp.email}"></td>
                    <td th:text="${emp.skills}"></td>
                    <td th:text="${emp.experience} + ' yrs'"></td>
                    <td th:text="${emp.department}"></td>
                    <td th:text="${emp.designation}"></td>

                    <td>
                        <a th:href="@{'/edit/' + ${emp.id}}"
                           class="btn btn-warning btn-sm btn-action">Edit</a>

                        <a th:href="@{'/delete/' + ${emp.id}}"
                           class="btn btn-danger btn-sm btn-action">Delete</a>
                    </td>

                </tr>
            </tbody>

        </table>

    </div>

</div>

<!-- SEARCH SCRIPT -->
<script>

    const searchInput = document.getElementById("searchInput");
    const deptFilter = document.getElementById("deptFilter");
    const desigFilter = document.getElementById("desigFilter");
    const table = document.getElementById("empTable");

    function filterTable() {

        const search = searchInput.value.toLowerCase();
        const dept = deptFilter.value.toLowerCase();
        const desig = desigFilter.value.toLowerCase();

        for (let row of table.tBodies[0].rows) {

            let text = row.innerText.toLowerCase();

            let deptCell = row.cells[4].innerText.toLowerCase();
            let desigCell = row.cells[5].innerText.toLowerCase();

            let matchesSearch = text.includes(search);
            let matchesDept = dept === "" || deptCell.includes(dept);
            let matchesDesig = desig === "" || desigCell.includes(desig);

            row.style.display =
                (matchesSearch && matchesDept && matchesDesig) ? "" : "none";
        }
    }

    searchInput.addEventListener("keyup", filterTable);
    deptFilter.addEventListener("change", filterTable);
    desigFilter.addEventListener("change", filterTable);

</script>

</body>
</html>
