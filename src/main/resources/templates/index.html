<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee App</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<h2>Employee List</h2>

<a href="/add" class="btn btn-primary mb-3">Add Employee</a>

<table class="table table-bordered">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Skills</th>
        <th>Experience</th>
        <th>Action</th>
    </tr>

    <tr th:each="emp : ${list}">
        <td th:text="${emp.name}"></td>
        <td th:text="${emp.email}"></td>
        <td th:text="${emp.skills}"></td>
        <td th:text="${emp.experience}"></td>
        <td>
            <a th:href="@{'/delete/' + ${emp.id}}" class="btn btn-danger">Delete</a>
        </td>
    </tr>
</table>

</body>
</html>
