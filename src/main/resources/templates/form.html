<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Employee</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<h2>Add Employee</h2>

<form action="/save" method="post" th:object="${employee}">

    <input type="text" th:field="*{name}" class="form-control mb-2" placeholder="Name">
    <input type="email" th:field="*{email}" class="form-control mb-2" placeholder="Email">
    <input type="text" th:field="*{skills}" class="form-control mb-2" placeholder="Skills">
    <input type="text" th:field="*{experience}" class="form-control mb-2" placeholder="Experience">

    <button class="btn btn-success">Save</button>

</form>

</body>
</html>
