<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Employee</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">Employee Management System</span>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">
        <h3 class="mb-4 text-center">Add Employee</h3>

        <!-- ✅ Success Message -->
        <div th:if="${success}" class="alert alert-success text-center">
            ✅ Your data has been recorded successfully!
        </div>

        <form action="/save" method="post" th:object="${employee}">

            <input type="text" th:field="*{name}" class="form-control mb-3" placeholder="Enter Name" required>

            <input type="email" th:field="*{email}" class="form-control mb-3" placeholder="Enter Email" required>

            <input type="text" th:field="*{skills}" class="form-control mb-3" placeholder="Skills (Java, DevOps...)" required>

	    <input type="text" th:field="*{department}" class="form-control mb-2" placeholder="Department">

            <input type="text" th:field="*{manager}" class="form-control mb-2" placeholder="Manager">

            <input type="number" th:field="*{salary}" class="form-control mb-2" placeholder="Salary">

            <input type="text" th:field="*{role}" class="form-control mb-2" placeholder="Role (ADMIN/EMPLOYEE)">
            
            <input type="password" th:field="*{password}" class="form-control mb-2" placeholder="Password">

            <input type="text" th:field="*{experience}" class="form-control mb-3" placeholder="Experience (2 years...)" required>

            <button class="btn btn-success w-100">Save Employee</button>

        </form>
    </div>

</div>

</body>
</html>
