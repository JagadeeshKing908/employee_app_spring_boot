<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Dashboard | Jagadeesh Company</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
            font-family: "Segoe UI", sans-serif;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #1d2b64, #f8cdda);
        }

        .navbar-brand {
            font-weight: bold;
        }

        /* Card */
        .card-box {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Profile section */
        .profile-header {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .info-value {
            font-weight: 500;
        }

        .section-title {
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 600;
            color: #1d2b64;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-update {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn-update:hover {
            opacity: 0.9;
        }

        .logout-btn {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg px-3 navbar-dark">
    <span class="navbar-brand text-white">
        🏢 Jagadeesh Employee Portal
    </span>

    <div class="ms-auto">
        <a href="/logout" class="btn btn-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- PROFILE CARD -->
    <div class="card card-box">

        <div class="profile-header">
            <h4>Welcome, <span th:text="${emp.name}"></span></h4>
            <small>Your Employee Dashboard</small>
        </div>

        <div class="p-4">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="info-label">Email</div>
                    <div class="info-value" th:text="${emp.email}"></div>
                </div>

                <div class="col-md-6 mb-3">
                    <div class="info-label">Department</div>
                    <div class="info-value" th:text="${emp.department}"></div>
                </div>

                <div class="col-md-6 mb-3">
                    <div class="info-label">Manager</div>
                    <div class="info-value" th:text="${emp.manager}"></div>
                </div>

                <div class="col-md-6 mb-3">
                    <div class="info-label">Experience</div>
                    <div class="info-value" th:text="${emp.experience} + ' yrs'"></div>
                </div>

                <div class="col-md-6 mb-3">
                    <div class="info-label">Salary</div>
                    <div class="info-value text-success fw-bold">
                        ₹ <span th:text="${emp.salary}"></span>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <div class="info-label">Skills</div>
                    <div class="info-value" th:text="${emp.skills}"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- UPDATE SKILLS -->
    <div class="card card-box mt-4 p-4">

        <div class="section-title">✏️ Update Your Skills</div>

        <form action="/employee/update-skills" method="post">

            <input type="text"
                   name="skills"
                   th:value="${emp.skills}"
                   class="form-control mb-3"
                   placeholder="Enter updated skills (Java, DevOps...)">

            <button class="btn btn-update w-100 text-white">
                Update Skills
            </button>

        </form>

    </div>

</div>

</body>
</html>
