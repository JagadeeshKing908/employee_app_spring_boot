<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="mb-4">Welcome, <span th:text="${emp.name}"></span></h2>

<div class="card p-4 shadow">
    <p><b>Email:</b> <span th:text="${emp.email}"></span></p>
    <p><b>Department:</b> <span th:text="${emp.department}"></span></p>
    <p><b>Manager:</b> <span th:text="${emp.manager}"></span></p>
    <p><b>Experience:</b> <span th:text="${emp.experience}"></span></p>
    <p><b>Salary:</b> <span th:text="${emp.salary}"></span></p>
</div>

<!-- EDIT SKILLS ONLY -->
<div class="mt-4">
    <h5>Update Skills</h5>

    <form action="/employee/update-skills" method="post">
        <input type="text" name="skills"
               th:value="${emp.skills}"
               class="form-control mb-2"
               placeholder="Enter your skills">

        <button class="btn btn-primary">Update Skills</button>
    </form>
</div>

<a href="/logout" class="btn btn-danger mt-4">Logout</a>

</body>
</html>
