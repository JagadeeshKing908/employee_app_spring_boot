<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jagadeesh Employee Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
    body {
        margin: 0;
        height: 100vh;
        font-family: "Segoe UI", sans-serif;

        /* Multi-color modern gradient */
        background: linear-gradient(120deg, #667eea, #764ba2, #6dd5ed, #2193b0);
        background-size: 300% 300%;
        animation: bgMove 12s ease infinite;

        display: flex;
        align-items: center;
        justify-content: center;
    }

    @keyframes bgMove {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    /* Main card */
    .login-card {
        width: 900px;
        max-width: 95%;
        display: flex;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    /* Left image section */
    .left {
        flex: 1;
        background: url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d") center/cover;
        position: relative;
    }

    .left::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.2));
    }

    .left-content {
        position: absolute;
        color: white;
        bottom: 30px;
        left: 30px;
        z-index: 2;
    }

    .left-content h2 {
        font-weight: 700;
    }

    /* Right form section */
    .right {
        flex: 1;
        background: rgba(255,255,255,0.95);
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .brand {
        text-align: center;
        font-size: 26px;
        font-weight: 700;
        color: #4a4a4a;
        margin-bottom: 5px;
    }

    .tagline {
        text-align: center;
        font-size: 14px;
        color: #777;
        margin-bottom: 25px;
    }

    .form-control {
        border-radius: 10px;
        padding: 10px;
    }

    .input-group-text {
        border-radius: 10px;
    }

    .btn-login {
        border-radius: 10px;
        padding: 10px;
        font-weight: bold;

        /* modern multi-color button */
        background: linear-gradient(135deg, #ff6a00, #ee0979);
        border: none;
        color: white;
    }

    .btn-login:hover {
        opacity: 0.9;
    }

    .error {
        color: red;
        text-align: center;
        margin-top: 10px;
    }

    /* small decorative images */
    .icons-row {
        display: flex;
        justify-content: space-around;
        margin-top: 15px;
        opacity: 0.7;
    }

    .icons-row img {
        width: 40px;
    }

    @media (max-width: 768px) {
        .login-card {
            flex-direction: column;
        }

        .left {
            height: 200px;
        }
    }
</style>
</head>

<body>

<div class="login-card">

    <!-- LEFT SIDE IMAGE -->
    <div class="left">
        <div class="left-content">
            <h2>Jagadeesh Company</h2>
            <p>Employee Management System</p>
        </div>
    </div>

    <!-- RIGHT LOGIN -->
    <div class="right">

        <div class="brand">
            <i class="bi bi-building"></i> Jagadeesh Portal
        </div>

        <div class="tagline">
            Secure employee access login
        </div>

        <form method="post" action="/login">

            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                </div>
            </div>

            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
            </div>

            <button class="btn btn-login w-100">
                Login
            </button>

        </form>

        <div class="error" th:text="${error}"></div>

        <!-- small decorative icons -->
        <div class="icons-row">
            <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            <img src="https://cdn-icons-png.flaticon.com/512/2920/2920277.png">
        </div>

    </div>

</div>

</body>
</html>
