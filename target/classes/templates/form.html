<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Employee | Jagadeesh Company</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
            font-family: "Segoe UI", sans-serif;
        }

        .navbar {
            background: linear-gradient(135deg, #1d2b64, #f8cdda);
        }

        .form-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-section-title {
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 10px;
            color: #1d2b64;
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 10px;
        }

        .btn-save {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            padding: 10px;
            font-weight: bold;
            border-radius: 10px;
            color: white;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg px-3 navbar-dark">
    <span class="navbar-brand text-white">
        🏢 Jagadeesh Employee System
    </span>
</nav>

<div class="container mt-5">

    <div class="card form-card p-4">

        <h3 class="text-center mb-4"
            th:text="${employee.id} != null ? 'Edit Employee' : 'Add New Employee'">
        </h3>

        <!-- SUCCESS MESSAGE -->
        <div th:if="${success}" class="alert alert-success text-center">
            ✅ Employee saved successfully!
        </div>

        <form action="/save" method="post" th:object="${employee}">

            <!-- IMPORTANT: for UPDATE -->
            <input type="hidden" th:field="*{id}">

            <!-- BASIC INFO -->
            <div class="form-section-title">👤 Basic Information</div>

            <div class="row">
                <div class="col-md-6">
                    <input type="text" th:field="*{name}" class="form-control mb-3" placeholder="Full Name" required>
                </div>

                <div class="col-md-6">
                    <input type="email"
                           th:field="*{email}"
                           class="form-control mb-3"
                           placeholder="Email Address"
                           th:readonly="${employee.id != null}"
                           required>
                </div>
            </div>

            <!-- PROFESSIONAL -->
            <div class="form-section-title">💼 Professional Details</div>

            <div class="row">
                <div class="col-md-6">
                    <input type="text" th:field="*{skills}" class="form-control mb-3" placeholder="Skills (Java, DevOps...)" required>
                </div>

                <div class="col-md-6">
                    <input type="number" th:field="*{experience}" class="form-control mb-3" placeholder="Experience (years)" required>
                </div>
            </div>

            <!-- ORGANIZATION -->
            <div class="form-section-title">🏢 Organization Details</div>

            <div class="row">

                <div class="col-md-6">
                    <select th:field="*{department}" class="form-select mb-3">
                        <option value="">Select Department</option>
                        <option value="IT">IT</option>
                        <option value="Finance">Finance</option>
                        <option value="HR">HR</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Sales">Sales</option>
                        <option value="DevOps">DevOps</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <select th:field="*{designation}" class="form-select mb-3">

                        <option value="">Select Designation</option>
                        <option value="Associate Software Engineer">Associate Software Engineer</option>
                        <option value="Software Engineer">Software Engineer</option>
                        <option value="Senior Software Engineer">Senior Software Engineer</option>
                        <option value="Tech Lead">Tech Lead</option>
                        <option value="Team Lead">Team Lead</option>
                        <option value="Technical Architect">Technical Architect</option>
                        <option value="Project Manager">Project Manager</option>
                        <option value="Engineering Manager">Engineering Manager</option>
                        <option value="Business Analyst">Business Analyst</option>
                        <option value="DevOps Engineer">DevOps Engineer</option>
                        <option value="QA Engineer">QA Engineer</option>

                    </select>
                </div>

            </div>

            <div class="row">
                <div class="col-md-6">
                    <input type="text" th:field="*{manager}" class="form-control mb-3" placeholder="Manager Name">
                </div>
            </div>

            <!-- ACCOUNT -->
            <div class="form-section-title">🔐 Account Details</div>

            <div class="row">

                <div class="col-md-4">
                    <input type="number" th:field="*{salary}" class="form-control mb-3" placeholder="Salary">
                </div>

                <div class="col-md-4">
                    <select th:field="*{role}" class="form-select mb-3">
                        <option value="">Select Role</option>
                        <option value="ADMIN">ADMIN</option>
                        <option value="EMPLOYEE">EMPLOYEE</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <input type="password"
                           th:field="*{password}"
                           class="form-control mb-3"
                           placeholder="Password">
                </div>

            </div>

            <button class="btn btn-save w-100">
                💾 Save Employee
            </button>

        </form>

    </div>

</div>

</body>
</html>
