<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Jagadeesh Company Employee Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
            font-family: "Segoe UI", sans-serif;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #1d2b64, #f8cdda);
        }

        .navbar-brand {
            font-weight: bold;
            color: white !important;
        }

        /* Cards */
        .card-box {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .stat-card {
            color: white;
            padding: 20px;
            border-radius: 15px;
        }

        .blue { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .green { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .orange { background: linear-gradient(135deg, #fa709a, #fee140); }

        /* Table */
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .table thead {
            background: #1d2b64;
            color: white;
        }

        .btn-action {
            border-radius: 8px;
            padding: 4px 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg px-3">
    <a class="navbar-brand" href="#">
        🏢 Jagadeesh Employee System
    </a>

    <div class="ms-auto">
        <a href="/add" class="btn btn-light btn-sm">+ Add Employee</a>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="mb-3">Employee Dashboard</h3>

    <!-- MESSAGE -->
    <div th:if="${message}" class="alert alert-success">
        <span th:text="${message}"></span>
    </div>

    <!-- STATS CARDS -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="stat-card blue">
                <h5>Total Employees</h5>
                <h3 th:text="${list.size()}">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card green">
                <h5>Active System</h5>
                <h3>Online</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card orange">
                <h5>Department</h5>
                <h3>IT / DevOps</h3>
            </div>
        </div>

    </div>

    <!-- TABLE -->
    <div class="table-container">

        <h5 class="mb-3">Employee Records</h5>

        <table class="table table-hover align-middle">

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Skills</th>
                    <th>Experience</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="emp : ${list}">
                    <td th:text="${emp.name}"></td>
                    <td th:text="${emp.email}"></td>
                    <td th:text="${emp.skills}"></td>
                    <td th:text="${emp.experience} + ' yrs'"></td>
                    <td>
                        <a th:href="@{'/edit/' + ${emp.id}}"
                           class="btn btn-warning btn-sm btn-action">Edit</a>

                        <a th:href="@{'/delete/' + ${emp.id}}"
                           class="btn btn-danger btn-sm btn-action">Delete</a>
                    </td>
                </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
